name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install -g npm@latest
      - run: npm --version

      - run: npm ci
      - run: npm run build

      - name: Publish with OIDC
        run: |
          # Fetch OIDC token
          RESPONSE=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org")
          export NPM_ID_TOKEN=$(echo "$RESPONSE" | jq -r '.value')
          echo "Token length: ${#NPM_ID_TOKEN}"

          # Clear any .npmrc that setup-node may have created
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc

          npm publish --provenance --access public
