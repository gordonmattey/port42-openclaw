name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install -g npm@latest
      - run: npm --version
      - run: npm ci
      - run: npm run build
      - uses: azu/setup-npm-trusted-publish@v1
      - run: npm publish --provenance --access public
